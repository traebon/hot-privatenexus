services:
  privatenexus-backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: privatenexus-backend
    restart: unless-stopped
    environment:
      PORT: ${PRIVATENEXUS_BACKEND_PORT:-3001}
    ports:
      - "${PRIVATENEXUS_BACKEND_PORT:-3001}:3001"

  privatenexus-frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_BASE: http://localhost:${PRIVATENEXUS_BACKEND_PORT:-3001}
    container_name: privatenexus-frontend
    restart: unless-stopped
    ports:
      - "${PRIVATENEXUS_FRONTEND_PORT:-5173}:80"
    depends_on:
      - privatenexus-backend

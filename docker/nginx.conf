server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SSE — alerts stream (must come before the generic /api/ block)
    location = /api/alerts/stream {
        proxy_pass http://privatenexus-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 3600s;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://privatenexus-backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache static assets aggressively (JS/CSS/fonts — no HTML, so CSP not applicable)
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control         "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Never cache the HTML entry point; full security headers
    location = /index.html {
        add_header Cache-Control           "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    # SPA fallback — all routes serve index.html (nginx internal-redirects to = /index.html
    # for non-existent paths, so headers here cover exact-match file serves at root)
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options  "nosniff" always;
        add_header X-Frame-Options         "DENY" always;
        add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy      "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }
}
